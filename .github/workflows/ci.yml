name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://webhook_user:webhook_password@localhost:5432/webhook_db?schema=public

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: webhook_user
          POSTGRES_PASSWORD: webhook_password
          POSTGRES_DB: webhook_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci

    - name: Run Prisma Generate
      run: npx prisma generate

    - name: Type Check
      run: npx tsc --noEmit

    - name: Build
      run: npm run build
